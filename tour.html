<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>云上党 · 文旅景点专题地图</title>
  <link rel="stylesheet" href="styles.css?v=20260719c" />
  <style>
    .category-buttons { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .category-btn {
      padding: 16px 20px;
      border: 2px solid #d5eadf;
      background: linear-gradient(135deg, #ffffff, #f8fffb);
      color: #144d35;
      font-weight: 700;
      font-size: 15px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(41, 112, 79, 0.08);
    }
    .category-btn:hover {
      border-color: #50c878;
      background: linear-gradient(135deg, #f4fff9, #ecfdf5);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(80, 200, 120, 0.2);
    }
    .category-btn.active {
      background: linear-gradient(135deg, #1f9d64, #50c878);
      color: #fff;
      border-color: #1f9d64;
      box-shadow: 0 6px 16px rgba(31, 157, 100, 0.3);
    }
    .category-btn.active:hover { transform: translateY(0); }
    .category-btn::before {
      content: "◆ ";
      margin-right: 8px;
    }
    .category-btn.active::before { content: "● "; }
    .module-content { display: none; }
    .module-content.active { display: block; }
  </style>
</head>
<body class="map-page">
  <main class="shell">
    <header class="topbar">
      <div class="header-bg">
        <img src="主页图片/文旅背景.jpg" alt="文旅背景" />
      </div>
      <div class="brand">
        <h1>云上党 · 文旅景点专题地图</h1>
        <p>以高德地图为底图，联动文旅景点点位详情与数据大屏。</p>
      </div>
      <nav class="nav">
        <a href="index.html">返回首页</a>
        <a class="primary" id="dashLink" href="文旅大屏.html">进入数据大屏</a>
      </nav>
    </header>
    <section class="grid">
      <aside class="panel sidebar sidebar-bg-tour">
        <input id="search" class="search" placeholder="搜索景点名称、历史遗迹、乡镇" />
        <div class="category-buttons">
          <button class="category-btn active" data-layer="tour_scenic">特色景点</button>
          <button class="category-btn" data-layer="tour_historic">历史遗迹</button>
        </div>
        <div id="pointList" class="list"></div>
      </aside>
      <section class="panel map-wrap">
        <div id="map"></div>
        <div id="fallbackMap" class="fallback-map">
          <div class="fallback-region"></div>
          <div id="fallbackPopup" class="fallback-popup"></div>
        </div>
        <div id="status" class="status"></div>
        <button id="centerBtn" class="center-btn">居中上党区</button>
      </section>
    </section>
  </main>
  <script src="config.js?v=20260719c"></script>
  <script src="data.js?v=20260719c"></script>
  <script src="app.js?v=20260719c"></script>
  <script src="page-enter.js?v=20260719c"></script>
</body>
</html>
