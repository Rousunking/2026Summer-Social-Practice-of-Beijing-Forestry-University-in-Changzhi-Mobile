<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>云上党 · 历史遗迹数据大屏</title>
  <link rel="stylesheet" href="styles.css?v=20260719h" />
</head>
<body>
  <main class="dash-grid">
    <header class="topbar">
      <div class="brand">
        <h1>云上党 · 历史遗迹数据大屏</h1>
        <p>总览区域历史遗迹资源态势，并与地图点位联动展示单点详情。</p>
      </div>
      <nav class="nav">
        <a href="index.html">返回首页</a>
        <a class="primary" id="backMap" href="tour.html">返回地图</a>
      </nav>
    </header>
    <section class="kpis" id="kpis"></section>
    <section class="dash-layout">
      <div class="col">
        <section class="card"><h2>乡镇遗迹数量排行</h2><div class="bar-list" id="townBars"></div></section>
        <section class="card"><h2>年代分布</h2><div class="bar-list" id="eraBars"></div></section>
      </div>
      <div class="col">
        <section class="card detail-card" id="detailCard"></section>
        <section class="card"><h2>点位分布示意</h2><div class="mini-map" id="miniMap"></div></section>
      </div>
      <div class="col">
        <section class="card">
          <h2>类别与保护级别分析</h2>
          <div class="donuts">
            <div class="donut-card"><div class="donut" id="categoryDonut"></div><div class="legend" id="categoryLegend"></div></div>
            <div class="donut-card"><div class="donut" id="townDonut"></div><div class="legend" id="townLegend"></div></div>
          </div>
        </section>
        <section class="card"><h2>遗迹列表</h2><div class="scroll-list" id="pointList"></div></section>
      </div>
    </section>
    <footer class="footer"><span>数据来源：上党区全国重点保护单位名单.xlsx</span><span>联动字段：遗迹编号 id</span></footer>
  </main>
  <script src="data.js?v=20260719h"></script>
  <script src="遗迹大屏.js?v=20260719h"></script>
  <script src="page-enter.js?v=20260719h"></script>
  <script src="dash-align.js?v=20260719h"></script>
</body>
</html>
