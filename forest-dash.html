  <style>
    .dash-grid {
      display: grid;

    }
    .kpis {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 12px;
    }
    .kpi {
      min-height: 88px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid #d5eadf;
      border-radius: 12px;
      box-shadow: 0 18px 45px rgba(41, 112, 79, 0.14);
      overflow: hidden;
      position: relative;
      transition: transform 0.25s, box-shadow 0.25s;
    }
    .kpi:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 50px rgba(41, 112, 79, 0.18);
    }
    .kpi.green .value { color: #1f9d64; }
    .kpi.blue .value { color: #3fa7d6; }
    .kpi.orange .value { color: #f3b63f; }
    .kpi.purple .value { color: #7b88d1; }
    .kpi.cyan .value { color: #3fa7d6; }
    .kpi.yellow .value { color: #f3b63f; }
    .kpi.teal .value { color: #2a8c3a; }
    .kpi .label { color: #668678; font-size: 12px; font-weight: 700; }
    .kpi .value { margin-top: 8px; font-size: clamp(20px, 2.5vw, 32px); line-height: 1; font-weight: 900; font-variant-numeric: tabular-nums; }
    .kpi .unit { color: #668678; font-size: 12px; margin-left: 3px; }
    .dash-layout { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; min-height: 0; }
    .col { display: grid; gap: 16px; min-height: 0; }
    .card { padding: 16px; background: rgba(255, 255, 255, 0.94); border: 1px solid #d5eadf; border-radius: 16px; box-shadow: 0 18px 45px rgba(41, 112, 79, 0.14); overflow: hidden; }
    .card h2 { margin: 0 0 12px; color: #144d35; font-size: 16px; }
    .bar-list { display: grid; gap: 8px; }
    .bar-row { display: grid; grid-template-columns: minmax(70px, 100px) 1fr 40px; align-items: center; gap: 8px; font-size: 12px; }
    .bar-name { color: #315849; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 700; }
    .bar-track { height: 9px; background: #eef6f1; border: 1px solid #e0efe7; border-radius: 999px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #2a8c3a, #4cae50); transition: width 0.6s ease; }
    .bar-value { text-align: right; color: #127449; font-weight: 900; font-variant-numeric: tabular-nums; }
    .mini-map { position: relative; height: 320px; border: 1px solid #cce9da; border-radius: 12px; background: linear-gradient(115deg, rgba(42, 140, 58, 0.12), transparent 48%), linear-gradient(0deg, rgba(31, 157, 100, 0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(31, 157, 100, 0.06) 1px, transparent 1px), #fbfffd; background-size: auto, 32px 32px, 32px 32px; overflow: hidden; }
    .detail-card { background: linear-gradient(120deg, #f9fff9, #ffffff); border-color: #bfe6d0; }
    .detail-title { display: flex; justify-content: space-between; gap: 10px; align-items: baseline; margin-bottom: 12px; }
    .detail-title strong { font-size: 18px; color: #144d35; }
    .detail-title span { font-size: 24px; font-weight: 900; color: #2a8c3a; white-space: nowrap; }
    .facts { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .fact { padding: 8px; background: rgba(255, 255, 255, 0.8); border: 1px solid #d5eadf; border-radius: 8px; }
    .fact b { display: block; color: #668678; font-size: 11px; margin-bottom: 3px; }
    .fact span { color: #144d35; font-size: 13px; line-height: 1.3; }
    .story { margin-top: 8px; color: #315849; font-size: 13px; line-height: 1.5; }
    .donuts { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .donut-card { min-height: 140px; display: grid; place-items: center; gap: 8px; padding: 12px; background: linear-gradient(180deg, #fff, #f5fbf7); border: 1px solid #e0efe7; border-radius: 12px; }
    .donut { width: 80px; height: 80px; border-radius: 50%; position: relative; background: conic-gradient(#2a8c3a 0 75%, #7b88d1 75% 100%); }
    .donut::after { content: ""; position: absolute; inset: 18px; background: #fff; border-radius: 50%; box-shadow: inset 0 0 0 1px #e2efe8; }
    .donut-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1; }
    .donut-center .num { font-size: 18px; font-weight: 900; color: #144d35; }
    .donut-center .label { font-size: 10px; color: #668678; }
    .legend { display: grid; gap: 6px; width: 100%; color: #517565; font-size: 12px; }
    .legend-row { display: flex; justify-content: space-between; gap: 8px; }

    .footer { display: flex; justify-content: space-between; gap: 14px; color: #668678; font-size: 11px; padding: 12px 16px; background: rgba(255, 255, 255, 0.94); border: 1px solid #d5eadf; }

    .lightbox-overlay.visible { display: flex; }
    .lightbox-image { max-width: 90%; max-height: 90%; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); cursor: zoom-out; animation: lightboxFadeIn 0.3s ease; }
    @keyframes lightboxFadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    .lightbox-close { position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; background: rgba(255,255,255,0.2); border: none; border-radius: 50%; color: #fff; font-size: 24px; cursor: pointer; display: flex; justify-content: center; align-items: center; }

    @media (max-width: 1180px) { .dash-layout { grid-template-columns: 1fr; } .kpis { grid-template-columns: repeat(3, minmax(0, 1fr)); } }

    function renderBarList(containerId, data) {
      const container = document.getElementById(containerId);
      if (!container) return;
      const max = Math.max(...data.map(d => d.value || d.count || d.area));
      container.innerHTML = data.map(item => {
        const val = item.value || item.count || item.area;
        const width = (val / max) * 100;
        return `<div class="bar-row"><span class="bar-name">${item.name}</span><div class="bar-track"><div class="bar-fill" style="width:${width}%"></div></div><span class="bar-value">${val}${item.unit || ''}</span></div>`;
      }).join('');
    }

    function renderRangerSelect() {
      const select = document.getElementById('rangerSelect');
      select.innerHTML = RANGER_DATA.map(r => `<option value="${r.id}">${r.name} - ${r.town}</option>`).join('');
      const urlId = new URLSearchParams(location.search).get("id");
      selectRanger(urlId && RANGER_DATA.find(r => r.id === urlId) ? urlId : RANGER_DATA[0].id);
    }

    function selectRanger(id) {

      document.getElementById('rangerSelect').value = id;
      const detail = document.getElementById('rangerDetail');
      const mapHtml = ranger.map ? `<div style="margin-top:12px;"><div style="color:#668678;font-size:12px;font-weight:700;margin-bottom:6px;">巡视区域图</div><img class="ranger-map" src="${ranger.map}" alt="${ranger.name}巡视区域" onclick="openLightbox('${ranger.map}', '${ranger.name}巡视区域')"/><div style="color:#999;font-size:11px;margin-top:4px;">点击地图放大查看</div></div>` : '';

      });

      url.searchParams.set("id", id);
      history.replaceState(null, "", url);
    }

      const lngs = pts.map(r => r.lng), lats = pts.map(r => r.lat);
      const minLng = Math.min(...lngs), maxLng = Math.max(...lngs), minLat = Math.min(...lats), maxLat = Math.max(...lats);
      const urlId = new URLSearchParams(location.search).get("id");
      pts.forEach(r => {
        const x = ((r.lng - minLng) / Math.max(maxLng - minLng, 0.0001)) * 72 + 14;
        const y = ((1 - (r.lat - minLat) / Math.max(maxLat - minLat, 0.0001))) * 68 + 17;
        const group = document.createElement('div');
        group.className = 'mini-group' + (urlId === r.id ? ' active' : '');
        group.dataset.id = r.id;
        group.style.left = x + '%';
        group.style.top = y + '%';
        group.title = r.name;
        group.addEventListener('click', () => selectRanger(r.id));
        const dot = document.createElement('span');
        dot.className = 'dot';
        dot.style.background = '#7b88d1';
        const label = document.createElement('span');
        label.className = 'mini-label';
        label.textContent = r.name;
        group.appendChild(dot);
        group.appendChild(label);
        miniMap.appendChild(group);
      });
    }

    function renderDonut() {
      const national = 1926.67, provincial = 644.23, total = national + provincial;
      const nationalPercent = (national / total) * 100;
      const donut = document.getElementById('gradeDonut');
      donut.style.background = `conic-gradient(#2a8c3a 0 ${nationalPercent}%, #7b88d1 ${nationalPercent}% 100%)`;
      donut.innerHTML = `<div class="donut-center"><div class="num">${total.toFixed(1)}</div><div class="label">公顷</div></div>`;
      const legend = document.getElementById('gradeLegend');
      legend.innerHTML = `<div class="legend-row"><span><span class="legend-color" style="background:#2a8c3a;"></span>国家公益林</span><strong>${national.toFixed(1)}</strong></div><div class="legend-row"><span><span class="legend-color" style="background:#7b88d1;"></span>省级公益林</span><strong>${provincial.toFixed(1)}</strong></div>`;
    }

    function openLightbox(src, caption) {
      const lightbox = document.getElementById('lightbox');
      const img = document.getElementById('lightboxImg');
      const cap = document.getElementById('lightboxCaption');
      img.src = src;
      cap.textContent = caption ? `${caption} - 点击关闭` : '点击关闭';
      lightbox.classList.add('visible');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      const lightbox = document.getElementById('lightbox');
      lightbox.classList.remove('visible');
      document.body.style.overflow = '';
    }

    function init() {
      renderBarList('townBars', TOWN_DATA);
      const areaData = RANGER_DATA.map(r => ({ name: r.name.replace(/\d$/, ''), value: parseFloat(r.area), unit: '亩' })).sort((a, b) => b.value - a.value).slice(0, 10);
      renderBarList('areaBars', areaData);
      renderBarList('resourceBars', RESOURCE_DATA);
      renderBarList('stationBars', STATION_DATA);
      renderRangerSelect();
      renderMiniMap();
      renderDonut();
      document.getElementById('lightbox').addEventListener('click', function(e) {
        if (e.target === this) closeLightbox();
      });
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
